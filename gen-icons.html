<!doctype html><html><body><canvas id="c"></canvas><a id="dl192" download="icon-192.png">Download 192</a> <a id="dl512" download="icon-512.png">Download 512</a>
<script>
function makeIcon(size){
  const c=document.createElement('canvas');c.width=c.height=size;
  const ctx=c.getContext('2d');
  const r=size*0.156;
  ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
  ctx.fillStyle='#1e3a5f';ctx.fill();
  ctx.font=`${size*0.55}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🏗',size/2,size/2+size*0.05);
  return c.toDataURL('image/png');
}
document.getElementById('dl192').href=makeIcon(192);
document.getElementById('dl512').href=makeIcon(512);
</script></body></html>
